<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio Local ProgSalkman</title>
    <!-- Importamos Water.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <!-- Tu CSS personalizado -->
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
<script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
  

</head>
<body>

<header>
    <h1>Repositorio Local ProgSalkman</h1>
    <nav>
        <a href="#electricidad">Electricidad</a> | 
        <a href="#mecanica">Mecánica</a> | 
        <a href="#tablas">Tablas</a>
    </nav>
</header>

<main>
    <section id="electricidad">
        <h2>Cálculos Eléctricos</h2>
        <div class="grid-calculadoras">
            
            <!-- Tarjeta 1 -->
            <article class="card">
                <h3>Ley de Ohm (V)</h3>
                <label>Corriente (I) - A</label>
                <input type="number" id="i_ohm" placeholder="0.0" oninput="calc()">
                
                <label>Resistencia (R) - Ω</label>
                <input type="number" id="r_ohm" placeholder="0.0" oninput="calc()">
                
                <p class="resultado">Resultado: <strong id="res_ohm">0</strong> V</p>
            </article>

            <!-- Tarjeta 2 -->
            <article class="card">
                <h3>Conversión mm</h3>
                <label>Pulgadas</label>
                <input type="number" id="inch" placeholder="1.0" oninput="calc()">
                <p class="resultado">Resultado: <strong id="res_mm">25.4</strong> mm</p>
            </article>

            <article class="card">
                <h3>PyScript</h3>
                <button type="button" id="my-button">Click Me for Pyscript!</button>
                <p class="resultado" id="my-p">Resultado: </p> 
                <div id="my-d"></div>
            </article>

        </div>
    </section>
</main>

<footer>
    <hr>
    <p><small>© 2026 - Repositorio de utilidades técnicas</small></p>
</footer>
    
<script src="script.js"></script>
<py-config>
    [terminal]
    false
</py-config>
<script type="py" src="./main.py"></script>
</body>
</html>
